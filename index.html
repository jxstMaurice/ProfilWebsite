<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <!-- FontAwesome für Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="index_style.css">
</head>
<body>

<div id="overlay" onclick="enterPortfolio()">
    <h1>click to enter...</h1>
</div>

<div id="portfolio">
    <!-- Wallet Modal -->
    <div id="wallet-modal" class="modal-inline hidden">
        <div class="modal-content-inline">
            <i class="fas fa-times close-modal" onclick="toggleWalletModal()"></i>
            <h3 class="modal-title">Meine Wallets</h3>
            <div class="wallet-list">
                <!--PAYPAL-->
                <div class="wallet-item" onclick="window.open('https://www.paypal.com/paypalme/mautpf', '_blank')">
                    <i class="fab fa-paypal wallet-icon"></i>
                    <span>PayPal</span>
                </div>
                <!--BITCOIN-->
                <div class="wallet-item"
                     onclick="copyToClipboard('bc1qd2xzxghwqxs8hy2mjxp8qcx4tq07m2vxgfgck5', 'Bitcoin Adresse')">
                    <i class="fab fa-btc wallet-icon"></i>
                    <span>BTC: bc1q...fgck5</span>
                </div>
                <!--ETH-->
                <div class="wallet-item"
                     onclick="copyToClipboard('0x694b3F2288Ff957f30FB11C7BaEb093500A1Bb62', 'Ethereum Adresse')">
                    <i class="fab fa-ethereum wallet-icon"></i>
                    <span>ETH: 0x69...Bb62</span>
                </div>
                <!--DOGE-->
                <div class="wallet-item"
                     onclick="copyToClipboard('DHKBMp4p7vxVYn14aLLLskTGWtGzxWpjfL', 'Dogecoin Adresse')">
                    <i class="fas fa-dog wallet-icon"></i>
                    <span>DOGE: DHKB...pjfL</span>
                </div>
            </div>
        </div>
    </div>

    <div class="profile-container">
        <div class="avatar">
            <!-- Ein Platzhalter passend zum Thema -->
            <img id="github-avatar"
                 alt="Avatar" draggable="false">
        </div>
        <div class="username">Maurice</div>
        <div class="tagline">Developer, Casino pro</div>
        <div class="location">
            <a href="https://de.wikipedia.org/wiki/Österreich" target="_blank" class="link-reset">
                <i class="fas fa-location-dot"></i> Austria
            </a>
        </div>

        <div class="socials">
            <i class="fab fa-discord" onclick="copyToClipboard('jxstmaurice', 'Discord Tag')"></i>
            <a href="https://github.com/jxstMaurice" target="_blank" class="link-reset">
                <i class="fab fa-github"></i>
            </a>
            <i class="fas fa-wallet" onclick="toggleWalletModal()"></i>
            <i class="fas fa-file" onclick="toggleInfoModal()"></i>
        </div>
    </div>

    <!-- Info Modal -->
    <div id="info-modal" class="modal-inline hidden">
        <div class="modal-content-inline">
            <i class="fas fa-times close-modal" onclick="toggleInfoModal()"></i>
            <h4 class="modal-title-small">Besucher-Daten</h4>
            <div class="info-details">
                <div class="info-item">
                    <i class="fas fa-network-wired"></i>
                    <span id="visitor-ip">IP: Lädt...</span>
                </div>
                <div class="info-item">
                    <i class="fas fa-tower-broadcast"></i>
                    <span id="visitor-isp">Provider: -</span>
                </div>
                <div class="info-item">
                    <i class="fas fa-link"></i>
                    <span id="visitor-referrer">Herkunft: -</span>
                </div>
                <div class="info-item">
                    <i class="fas fa-cookie-bite"></i>
                    <span id="visitor-cookies" class="info-cookies">Cookies: Keine</span>
                </div>
                <div class="info-item">
                    <i class="fas fa-desktop"></i>
                    <span id="visitor-screen">Auflösung: -</span>
                </div>
                <div class="info-item">
                    <i class="fas fa-language"></i>
                    <span id="visitor-lang">Sprache: -</span>
                </div>
                <div class="info-item">
                    <i class="fas fa-globe"></i>
                    <span id="visitor-browser">Browser: -</span>
                </div>
                <div class="info-item">
                    <i class="fas fa-microchip"></i>
                    <span id="visitor-hardware">Hardware: -</span>
                </div>
                <div class="info-item">
                    <i class="fas fa-clock"></i>
                    <span id="visitor-tz">Zeitzone: -</span>
                </div>
                <div class="info-item">
                    <i class="fas fa-signal"></i>
                    <span id="visitor-status">Status: Online</span>
                </div>
                <div class="info-item">
                    <i class="fas fa-bolt"></i>
                    <span id="visitor-load">Ladezeit: -</span>
                </div>
                <div class="info-item">
                    <i class="fas fa-wifi"></i>
                    <span id="visitor-ping">Ping: -</span>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="notification"></div>

</body>
</html>

<script src="index_script.js"></script>
